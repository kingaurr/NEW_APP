name: trading_app
description: AI量化交易助手APP
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '^3.11.0'

dependencies:
  flutter:
    sdk: flutter
  
  # 网络与存储
  http: ^1.1.0
  shared_preferences: ^2.2.0
  
  # UI 组件
  fl_chart: ^0.65.0
  package_info_plus: ^4.0.0
  local_auth: ^2.1.7
  flutter_markdown: ^0.6.18
  file_picker: ^5.5.0
  intl: ^0.18.1
  
  # 语音相关
  speech_to_text: ^6.6.0
  record: ^5.0.0
  audioplayers: ^5.2.1
  
  # 状态管理
  provider: ^6.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

# 固定依赖版本，避免平台实现缺失警告（仅增加）
dependency_overrides:
  record: 5.0.0
  record_platform_interface: 1.5.0

flutter:
  uses-material-design: true
  # 增加资源目录预留（仅增加）
  assets:
    - assets/          # 预留资源文件夹
    - assets/voices/   # 预留语音文件
    - assets/icons/    # 预留图标