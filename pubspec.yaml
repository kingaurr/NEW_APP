name: trading_app
description: AI量化交易助手APP
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=2.19.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  http: ^1.1.0
  shared_preferences: ^2.2.0
  fl_chart: ^0.65.0
  package_info_plus: ^4.0.0
  local_auth: ^2.1.7
  flutter_markdown: ^0.6.18
  file_picker: ^5.5.0
  intl: ^0.18.1
  speech_to_text: ^6.6.0
  record: ^5.0.0           # 升级到 5.0.0
  audioplayers: ^5.2.1
  provider: ^6.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  platforms:                 # 新增：指定平台，避免桌面平台检查
    android:
    ios:
  assets:
    - assets/
    - assets/voices/
    - assets/icons/